<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Monica ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ffccd5);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
}

/* Background */
#backgroundImage {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25;
}

/* Content */
#mainContent {
    display: none;
    position: relative;
    z-index: 2;
}

#typing {
    font-size: 42px;
}

#message, #question {
    font-size: 24px;
    margin-top: 10px;
    opacity: 0;
    transition: 1s;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes { background: #28a745; color: white; }
#no  { background: #dc3545; color: white; position: absolute; }

/* Hearts */
.heart {
    position: absolute;
    font-size: 24px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% {
        transform: translate(0,0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) scale(1.5);
        opacity: 0;
    }
}

#loveResponse {
    display: none;
    font-size: 40px;
    margin-top: 20px;
}
</style>
</head>

<body>

<img id="backgroundImage" src="PXL_20260328_181057925.jpg">

<div id="typing"></div>

<div id="mainContent">
    <h1>I love you so much hunny ❤️</h1>

    <div id="message">You mean everything to me 💕</div>
    <div id="question">Do you love me too? 😏</div>

    <div>
        <button id="yes">Yes 💕</button>
        <button id="no">No 😈</button>
    </div>

    <div id="loveResponse">I knew it ❤️</div>
</div>

<script>
window.onload = () => {

    // Typing
    const text = "I love you so much hunny ❤️";
    let i = 0;

    function type() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text[i];
            i++;
            setTimeout(type, 70);
        } else {
            setTimeout(() => {
                document.getElementById("typing").style.display = "none";
                document.getElementById("mainContent").style.display = "block";

                setTimeout(() => {
                    document.getElementById("message").style.opacity = 1;
                }, 1000);

                setTimeout(() => {
                    document.getElementById("question").style.opacity = 1;
                }, 2000);
            }, 800);
        }
    }

    type();

    // 💥 HEART EXPLOSION FUNCTION
    function explodeHearts() {
        for (let i = 0; i < 80; i++) {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";

            // Start from center
            heart.style.left = "50%";
            heart.style.top = "50%";

            // Random explosion direction
            const x = (Math.random() - 0.5) * 600 + "px";
            const y = (Math.random() - 0.5) * 600 + "px";

            heart.style.setProperty("--x", x);
            heart.style.setProperty("--y", y);

            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 1000);
        }
    }

    // YES button 💥 + vibration
    document.getElementById("yes").onclick = () => {

        // 📳 STRONG vibration
        if (navigator.vibrate) {
            navigator.vibrate([300,100,300,100,500]);
        }

        explodeHearts();

        document.getElementById("loveResponse").style.display = "block";

        document.getElementById("yes").style.display = "none";
        document.getElementById("no").style.display = "none";

        document.body.style.background = "linear-gradient(135deg, #ff1e4d, #ff99aa)";
    };

    // NO button 😂
    const noBtn = document.getElementById("no");
    noBtn.onmouseover = () => {
        noBtn.style.left = Math.random() * 80 + "vw";
        noBtn.style.top = Math.random() * 80 + "vh";
    };

};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Monica, thank you for being a great mother to our baby ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ffccd5);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
}

/* Typing text */
#typing {
    font-size: 42px;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
}

/* Hidden content */
#mainContent {
    display: none;
}

/* Message */
#message {
    font-size: 24px;
    margin-top: 20px;
    opacity: 0;
    transition: 1s;
}

/* Buttons */
.buttons {
    margin-top: 30px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #28a745;
    color: white;
}

#no {
    background: #dc3545;
    color: white;
    position: absolute;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Slideshow */
#slideshow {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: -1;
}

#slideshow img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: fade 12s infinite;
}

#slideshow img:nth-child(1) { animation-delay: 0s; }
#slideshow img:nth-child(2) { animation-delay: 4s; }
#slideshow img:nth-child(3) { animation-delay: 8s; }

@keyframes fade {
    0% { opacity: 0; }
    10% { opacity: 0.4; }
    30% { opacity: 0.4; }
    40% { opacity: 0; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<!-- Typing intro -->
<div id="typing"></div>

<!-- Main content -->
<div id="mainContent">

    <!-- Photos -->
    <div id="slideshow">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>

    <h1>I love you, Monica ❤️</h1>

    <div id="message">You mean everything to me 💕</div>

    <div class="buttons">
        <button id="yes">Yes 💕</button>
        <button id="no">No 😈</button>
    </div>

</div>

<script>

// Typing effect
const text = "I love you Monica ❤️";
let index = 0;

function typeWriter() {
    if (index < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, 80);
    } else {
        setTimeout(() => {
            document.getElementById("typing").style.display = "none";
            document.getElementById("mainContent").style.display = "block";

            // Show message after delay
            setTimeout(() => {
                document.getElementById("message").style.opacity = 1;
            }, 2000);

        }, 1000);
    }
}

typeWriter();

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// Yes button = heart explosion
document.getElementById("yes").onclick = () => {
    for (let i = 0; i < 40; i++) {
        createHeart();
    }
};

// No button runs away 😂
const noBtn = document.getElementById("no");
noBtn.onmouseover = () => {
    noBtn.style.left = Math.random() * 80 + "vw";
    noBtn.style.top = Math.random() * 80 + "vh";
};

</script>

</body>
</html>

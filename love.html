<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Monica ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ffccd5);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
}

/* Background */
#backgroundImage {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25;
}

/* Content */
#mainContent {
    display: none;
    position: relative;
    z-index: 2;
}

#typing {
    font-size: 42px;
}

/* Text */
#message, #question {
    font-size: 24px;
    margin-top: 10px;
    opacity: 0;
    transition: 1s;
}

/* Buttons */
button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes { background: #28a745; }
#no  { background: #dc3545; position: absolute; }

/* Firework hearts */
.heart {
    position: absolute;
    font-size: 24px;
    animation: explode 1.2s ease-out forwards;
}

/* Sparkles */
.sparkle {
    position: absolute;
    font-size: 14px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
}

/* Final message */
#loveResponse {
    opacity: 0;
    font-size: 36px;
    margin-top: 20px;
    line-height: 1.4;
    transition: opacity 0.8s ease;
    position: relative;
    z-index: 9999;
}
</style>
</head>

<body>

<img id="backgroundImage" src="PXL_20260328_181057925.jpg">

<div id="typing"></div>

<div id="mainContent">
    <h1>I love you so much hunny ❤️</h1>

    <div id="message">You mean everything to me 💕</div>
    <div id="question">Do you love me too? 😏</div>

    <div>
        <button id="yes">Yes 💕</button>
        <button id="no">No 😈</button>
    </div>

    <div id="loveResponse">
        I knew it! ❤️<br>
        Now show me them titties 😏
    </div>
</div>

<script>
window.onload = () => {

    // Typing effect
    const text = "I love you so much hunny ❤️";
    let i = 0;

    function type() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text[i];
            i++;
            setTimeout(type, 70);
        } else {
            setTimeout(() => {
                document.getElementById("typing").style.display = "none";
                document.getElementById("mainContent").style.display = "block";

                setTimeout(() => {
                    document.getElementById("message").style.opacity = 1;
                }, 1000);

                setTimeout(() => {
                    document.getElementById("question").style.opacity = 1;
                }, 2000);

                setupButtons();
            }, 800);
        }
    }

    type();

    // Firework function
    function firework(button) {
        const rect = button.getBoundingClientRect();
        const startX = rect.left + rect.width / 2;
        const startY = rect.top + rect.height / 2;

        for (let i = 0; i < 60; i++) {

            const angle = Math.random() * 2 * Math.PI;
            const distance = Math.random() * 300 + 100;

            // ❤️ Heart
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";

            heart.style.left = startX + "px";
            heart.style.top = startY + "px";

            heart.style.setProperty("--x", Math.cos(angle) * distance + "px");
            heart.style.setProperty("--y", Math.sin(angle) * distance + "px");

            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1200);

            // ✨ Sparkle
            const sparkle = document.createElement("div");
            sparkle.className = "sparkle";
            sparkle.innerHTML = "✨";

            sparkle.style.left = startX + "px";
            sparkle.style.top = startY + "px";

            sparkle.style.setProperty("--x", Math.cos(angle) * distance * 0.6 + "px");
            sparkle.style.setProperty("--y", Math.sin(angle) * distance * 0.6 + "px");

            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }
    }

    function setupButtons() {
        const yesBtn = document.getElementById("yes");
        const noBtn = document.getElementById("no");
        const msg = document.getElementById("loveResponse");

        yesBtn.addEventListener("click", () => {

            // vibration
            if (navigator.vibrate) {
                navigator.vibrate([300,100,300,100,500]);
            }

            // multiple fireworks
            for (let i = 0; i < 4; i++) {
                setTimeout(() => firework(yesBtn), i * 250);
            }

            // show message instantly
            msg.style.opacity = 1;

            // hide buttons
            yesBtn.style.display = "none";
            noBtn.style.display = "none";

            // glow
            document.body.style.background =
                "linear-gradient(135deg, #ff1e4d, #ff99aa)";
        });

        noBtn.addEventListener("mouseover", () => {
            noBtn.style.left = Math.random() * 80 + "vw";
            noBtn.style.top = Math.random() * 80 + "vh";
        });
    }

};
</script>

</body>
</html>

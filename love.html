<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Monica ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ffccd5);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
}

/* Background image */
#backgroundImage {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.25;
}

/* Content */
#mainContent {
    display: none;
    position: relative;
    z-index: 2;
}

#typing {
    font-size: 42px;
}

/* Text */
#message, #question {
    font-size: 24px;
    margin-top: 10px;
    opacity: 0;
    transition: 1s;
}

/* Buttons */
button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #28a745;
    color: white;
}

#no {
    background: #dc3545;
    color: white;
    position: absolute;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Final message */
#loveResponse {
    display: none;
    font-size: 40px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- Background -->
<img id="backgroundImage" src="PXL_20260328_181057925.jpg">

<!-- Typing -->
<div id="typing"></div>

<!-- Main content -->
<div id="mainContent">

    <h1>I love you so much hunny ❤️</h1>

    <div id="message">You mean everything to me 💕</div>
    <div id="question">Do you love me too? 😏</div>

    <div>
        <button id="yes">Yes 💕</button>
        <button id="no">No 😈</button>
    </div>

    <div id="loveResponse">I knew it ❤️</div>

</div>

<script>
window.onload = () => {

    // Typing effect
    const text = "I love you so much hunny ❤️";
    let i = 0;

    function type() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text[i];
            i++;
            setTimeout(type, 70);
        } else {
            setTimeout(() => {
                document.getElementById("typing").style.display = "none";
                document.getElementById("mainContent").style.display = "block";

                setTimeout(() => {
                    document.getElementById("message").style.opacity = 1;
                }, 1000);

                setTimeout(() => {
                    document.getElementById("question").style.opacity = 1;
                }, 2000);

            }, 800);
        }
    }

    type();

    // Heart function
    function heart() {
        const h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }

    setInterval(heart, 300);

    // YES button 💥 + vibration 📳
    document.getElementById("yes").onclick = () => {

        // Vibration (Android)
        if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200, 100, 400]);
        }

        // Heart explosion
        for (let i = 0; i < 120; i++) {
            setTimeout(heart, i * 10);
        }

        // Show message
        document.getElementById("loveResponse").style.display = "block";

        // Hide buttons
        document.getElementById("yes").style.display = "none";
        document.getElementById("no").style.display = "none";

        // Glow effect
        document.body.style.background = "linear-gradient(135deg, #ff1e4d, #ff99aa)";
    };

    // NO button runs away 😂
    const noBtn = document.getElementById("no");
    noBtn.onmouseover = () => {
        noBtn.style.left = Math.random() * 80 + "vw";
        noBtn.style.top = Math.random() * 80 + "vh";
    };

};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You Monica ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff4d6d, #ffccd5);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
    text-align: center;
}

/* Keep content above images */
#mainContent {
    display: none;
    position: relative;
    z-index: 2;
}

/* Typing */
#typing {
    font-size: 42px;
}

/* Text */
#message, #question {
    font-size: 24px;
    margin-top: 10px;
    opacity: 0;
    transition: 1s;
}

/* Buttons */
button {
    padding: 12px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yes {
    background: #28a745;
    color: white;
}

#no {
    background: #dc3545;
    color: white;
    position: absolute;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Background image (NO animation = no glitch) */
#backgroundImage {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.25;
}
</style>
</head>

<body>

<!-- ONE stable background image -->
<img id="backgroundImage" src="PXL_20260328_181057925.jpg">

<div id="typing"></div>

<div id="mainContent">

    <h1>I love you so much hunny ❤️</h1>

    <div id="message">You mean everything to me 💕</div>
    <div id="question">Do you love me too? 😏</div>

    <div>
        <button id="yes">Yes 💕</button>
        <button id="no">No 😈</button>
    </div>

</div>

<script>
window.onload = () => {

    // Typing
    const text = "I love you so much hunny ❤️";
    let i = 0;

    function type() {
        if (i < text.length) {
            document.getElementById("typing").innerHTML += text[i];
            i++;
            setTimeout(type, 70);
        } else {
            setTimeout(() => {
                document.getElementById("typing").style.display = "none";
                document.getElementById("mainContent").style.display = "block";

                setTimeout(() => {
                    document.getElementById("message").style.opacity = 1;
                }, 1000);

                setTimeout(() => {
                    document.getElementById("question").style.opacity = 1;
                }, 2000);

            }, 800);
        }
    }

    type();

    // Hearts
    function heart() {
        const h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }

    setInterval(heart, 300);

    // Buttons
    document.getElementById("yes").onclick = () => {
        for (let i = 0; i < 40; i++) heart();
    };

    const noBtn = document.getElementById("no");
    noBtn.onmouseover = () => {
        noBtn.style.left = Math.random() * 80 + "vw";
        noBtn.style.top = Math.random() * 80 + "vh";
    };

};
</script>

</body>
</html>

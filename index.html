<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Click Me ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffccd5;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Button */
button {
    padding: 20px 40px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    z-index: 2;
}

button:hover {
    background: #e63950;
}

/* Floating hearts */
.heart {
    position: absolute;
    bottom: -20px;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<button onclick="window.location.href='love.html'">
    Click Here ❤️
</button>

<script>
// Create floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
